##### ------------------------------------------------------------
##### Minimal, fast, no-plugins tmux config
##### ------------------------------------------------------------

# --- Prefix (Ctrl-a) ---
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux.conf reloaded"

# If you use ~/.tmux.conf instead, comment above and use:
# bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

# --- Quality of life ---
set -g mouse on
setw -g mode-keys vi

# Start window/pane numbering at 1 (more human-friendly)
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Reduce ESC delay in (neo)vim inside tmux
# This is a common fix for delayed ESC key behavior.
set -sg escape-time 0

# Larger scrollback
set -g history-limit 50000

# --- True color / modern terminal support ---
# Try to keep colors correct in modern terminals.
# (Works well on iTerm2 / Alacritty / Kitty / Ghostty etc.)
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
# Some setups prefer RGB capability explicitly:
# set -ga terminal-overrides ",xterm-256color:RGB"

# --- Splits (ergonomic) ---
unbind '"'
unbind %
bind | split-window -h
bind - split-window -v
bind c new-window

# --- Pane navigation (Vim-like) ---
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes (repeatable)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 3
bind -r K resize-pane -U 3
bind -r L resize-pane -R 5

# Quick swap panes
bind < swap-pane -U
bind > swap-pane -D

# --- Copy mode: Vim-like selection + system clipboard ---
# Enter copy-mode: prefix + [
bind [ copy-mode

# Selection keys
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi V send -X select-line
bind -T copy-mode-vi C-v send -X rectangle-toggle

# Copy to system clipboard (macOS / Wayland / X11)
# tmux 2.6+ supports copy-pipe-and-cancel with pbcopy directly on macOS.
# We'll detect tools at runtime.
bind -T copy-mode-vi y run-shell -b ' \
  if command -v pbcopy >/dev/null 2>&1; then \
    tmux send -X copy-pipe-and-cancel "pbcopy"; \
  elif command -v wl-copy >/dev/null 2>&1; then \
    tmux send -X copy-pipe-and-cancel "wl-copy"; \
  elif command -v xclip >/dev/null 2>&1; then \
    tmux send -X copy-pipe-and-cancel "xclip -in -selection clipboard"; \
  else \
    tmux display-message "No clipboard tool found (pbcopy/wl-copy/xclip)"; \
  fi'

# Also copy on Enter (nice when your muscle memory is Enter)
bind -T copy-mode-vi Enter run-shell -b ' \
  if command -v pbcopy >/dev/null 2>&1; then \
    tmux send -X copy-pipe-and-cancel "pbcopy"; \
  elif command -v wl-copy >/dev/null 2>&1; then \
    tmux send -X copy-pipe-and-cancel "wl-copy"; \
  elif command -v xclip >/dev/null 2>&1; then \
    tmux send -X copy-pipe-and-cancel "xclip -in -selection clipboard"; \
  else \
    tmux display-message "No clipboard tool found (pbcopy/wl-copy/xclip)"; \
  fi'

# Optional: paste from system clipboard to tmux (prefix + p)
bind p run-shell -b ' \
  if command -v pbpaste >/dev/null 2>&1; then \
    pbpaste | tmux load-buffer - \; paste-buffer; \
  elif command -v wl-paste >/dev/null 2>&1; then \
    wl-paste | tmux load-buffer - \; paste-buffer; \
  elif command -v xclip >/dev/null 2>&1; then \
    xclip -out -selection clipboard | tmux load-buffer - \; paste-buffer; \
  else \
    tmux display-message "No clipboard tool found (pbpaste/wl-paste/xclip)"; \
  fi'

# --- Status line (clean & readable) ---
set -g status on
set -g status-interval 5
set -g status-left-length 40
set -g status-right-length 120
set -g status-left " #[bold]#S #[default]"
set -g status-right " %Y-%m-%d %H:%M "

# --- Safer clipboard integration (optional) ---
# tmux has a built-in set-clipboard option, but note the security implications:
# with set-clipboard on (tmux 2.6+), any program running inside tmux can set OS clipboard.
# See tmux wiki for details.
# set -g set-clipboard on

# --- Modern terminal capabilities ---
# Needed by smart-splits.nvim and nvim autoread to react when tmux gets focus.
set -g focus-events on
# Undercurl + colored underlines (LSP diagnostics in nvim).
set -as terminal-features ",xterm-256color:RGB"
set -as terminal-features ",xterm-256color:usstyle"

# --- Floating scratch shell ---
# prefix + g  → popup terminal at current pane's working directory
bind g display-popup -E -d "#{pane_current_path}" -w 80% -h 75%

# --- Plugins (TPM) ---
# Install TPM once:
#   git clone https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm
# Then inside tmux: prefix + I to install, prefix + U to update.
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'omerxx/tmux-sessionx'
set -g @plugin 'fcsonline/tmux-thumbs'
set -g @plugin 'wfxr/tmux-fzf-url'
set -g @plugin 'catppuccin/tmux#latest'

# tmux-resurrect / tmux-continuum
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# tmux-sessionx — prefix + o opens an fzf session picker popup
set -g @sessionx-bind 'o'
set -g @sessionx-zoxide-mode 'on'
set -g @sessionx-window-height '70%'
set -g @sessionx-window-width '70%'

# tmux-thumbs — prefix + Space enters hint mode for paths/hashes/URLs
set -g @thumbs-key Space
set -g @thumbs-command 'echo -n {} | pbcopy'

# tmux-fzf-url — prefix + u → fzf list of URLs in the current pane
set -g @fzf-url-bind 'u'
set -g @fzf-url-history-limit '2000'

# Catppuccin — set flavor and style BEFORE running TPM
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style 'rounded'
set -g @catppuccin_window_default_text '#W'
set -g @catppuccin_window_current_text '#W'

# Initialize TPM (must be near the bottom)
run '~/.config/tmux/plugins/tpm/tpm'

# Status line — placed AFTER tpm so catppuccin variables resolve
set -g status-right "#{E:@catppuccin_status_session} #{E:@catppuccin_status_date_time}"

# --- sesh: smart session manager ---
# Install: brew install joshmedeski/sesh/sesh
# prefix + T → fzf popup of project sessions (zoxide-powered)
bind -N "sesh picker" T display-popup -E -w 70% -h 60% \
  "sesh connect \"$(sesh list -i | fzf-tmux -p 70%,60% --no-border --prompt '⚡ ')\""

